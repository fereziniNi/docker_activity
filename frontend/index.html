<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg:       #0A0A0F;
        --surface:  #13131A;
        --border:   #1E1E2E;
        --purple:   #7C3AED;
        --purple-light: #A78BFA;
        --purple-glow:  #7C3AED55;
        --text:     #F8FAFC;
        --muted:    #64748B;
      }

      html, body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter', sans-serif;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
      }

      /* Ambient background glow */
      body::before {
        content: '';
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, var(--purple-glow) 0%, transparent 70%);
        pointer-events: none;
        transition: opacity 0.4s ease;
        opacity: 0.5;
      }

      body.clicked::before {
        opacity: 1;
      }

      .wrapper {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 56px;
      }

      /* ── Counter display ── */
      .counter-block {
        text-align: center;
        user-select: none;
      }

      .counter-label {
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 12px;
      }

      .counter-number {
        font-family: 'Space Grotesk', sans-serif;
        font-size: clamp(80px, 15vw, 140px);
        font-weight: 700;
        line-height: 1;
        color: var(--text);
        transition: transform 0.08s cubic-bezier(0.34, 1.56, 0.64, 1),
                    color 0.2s ease;
      }

      .counter-number.bump {
        transform: scale(1.12);
        color: var(--purple-light);
      }

      /* ── Button ── */
      .btn {
        position: relative;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        background: var(--purple);
        box-shadow:
          0 0 0 0 var(--purple-glow),
          0 20px 60px rgba(124, 58, 237, 0.4);
        transition:
          transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.25s ease,
          background 0.2s ease;
        outline: none;
        -webkit-tap-highlight-color: transparent;
      }

      .btn::before {
        content: '';
        position: absolute;
        inset: 3px;
        border-radius: 50%;
        background: linear-gradient(145deg, #9F5CFF 0%, var(--purple) 60%);
        transition: opacity 0.2s;
      }

      .btn::after {
        content: '';
        position: absolute;
        inset: -2px;
        border-radius: 50%;
        border: 1.5px solid rgba(167, 139, 250, 0.25);
        transition: border-color 0.2s;
      }

      .btn-icon {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .btn-icon svg {
        width: 48px;
        height: 48px;
        stroke: rgba(255,255,255,0.95);
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
        transition: transform 0.12s ease;
      }

      /* hover */
      .btn:hover {
        transform: scale(1.06);
        box-shadow:
          0 0 0 16px rgba(124, 58, 237, 0.12),
          0 24px 72px rgba(124, 58, 237, 0.55);
      }

      .btn:hover::after {
        border-color: rgba(167, 139, 250, 0.55);
      }

      /* active / press */
      .btn:active, .btn.pressing {
        transform: scale(0.93);
        box-shadow:
          0 0 0 6px rgba(124, 58, 237, 0.2),
          0 8px 30px rgba(124, 58, 237, 0.35);
      }

      /* ripple */
      .ripple {
        position: absolute;
        border-radius: 50%;
        width: 200px;
        height: 200px;
        background: rgba(167, 139, 250, 0.22);
        transform: scale(0);
        animation: ripple-anim 0.6s linear forwards;
        pointer-events: none;
      }

      @keyframes ripple-anim {
        to { transform: scale(3.5); opacity: 0; }
      }

      /* ── Status bar ── */
      .status {
        font-size: 12px;
        font-weight: 500;
        color: var(--muted);
        letter-spacing: 0.04em;
        min-height: 18px;
        transition: color 0.3s ease;
      }

      .status.error { color: #F87171; }
      .status.ok    { color: #34D399; }

      /* loading skeleton pulse */
      .counter-number.loading {
        color: var(--border);
        animation: skeleton 1.4s ease-in-out infinite;
      }

      @keyframes skeleton {
        0%, 100% { opacity: 0.4; }
        50%       { opacity: 1; }
      }

      /* ── Particles ── */
      .particle {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        animation: particle-fly 0.8s ease-out forwards;
      }

      @keyframes particle-fly {
        0%   { transform: translate(0,0) scale(1); opacity: 1; }
        100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="counter-block">
        <p class="counter-label">vezes pressionado</p>
        <div class="counter-number loading" id="count">0</div>
      </div>

      <button class="btn" id="btn" aria-label="Incrementar contador">
        <span class="btn-icon">
          <!-- Plus icon -->
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </span>
      </button>

      <p class="status" id="status">carregando…</p>
    </div>

    <script>
      const API = '/api';
      const countEl  = document.getElementById('count');
      const btnEl    = document.getElementById('btn');
      const statusEl = document.getElementById('status');

      /* ── Fetch current count ── */
      async function loadCount() {
        try {
          const res  = await fetch(`${API}/count`);
          const data = await res.json();
          setCount(data.count);
          countEl.classList.remove('loading');
          setStatus('conectado', 'ok');
        } catch {
          setStatus('erro ao conectar com o servidor', 'error');
        }
      }

      /* ── Click handler ── */
      btnEl.addEventListener('click', async (e) => {
        spawnRipple(e);
        spawnParticles(e);
        btnEl.classList.add('pressing');
        setTimeout(() => btnEl.classList.remove('pressing'), 160);

        try {
          const res  = await fetch(`${API}/count`, { method: 'POST' });
          const data = await res.json();
          setCount(data.count);
          setStatus('clique registrado!', 'ok');
        } catch {
          setStatus('falha ao registrar clique', 'error');
        }
      });

      /* ── Helpers ── */
      function setCount(n) {
        countEl.textContent = n.toLocaleString('pt-BR');
        countEl.classList.remove('bump');
        void countEl.offsetWidth; // force reflow
        countEl.classList.add('bump');
        document.body.classList.add('clicked');
        setTimeout(() => {
          countEl.classList.remove('bump');
          document.body.classList.remove('clicked');
        }, 300);
      }

      function setStatus(msg, type = '') {
        statusEl.textContent = msg;
        statusEl.className = 'status ' + type;
        if (type === 'ok') setTimeout(() => {
          statusEl.textContent = '';
          statusEl.className = 'status';
        }, 1800);
      }

      function spawnRipple(e) {
        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        btnEl.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove());
      }

      function spawnParticles(e) {
        const colors = ['#A78BFA','#7C3AED','#C4B5FD','#DDD6FE'];
        const cx = e.clientX, cy = e.clientY;
        for (let i = 0; i < 10; i++) {
          const p = document.createElement('div');
          p.className = 'particle';
          const size = 4 + Math.random() * 6;
          const angle = Math.random() * Math.PI * 2;
          const dist  = 60 + Math.random() * 80;
          p.style.cssText = `
            left:${cx - size/2}px; top:${cy - size/2}px;
            width:${size}px; height:${size}px;
            background:${colors[Math.floor(Math.random()*colors.length)]};
            --tx:${Math.cos(angle)*dist}px;
            --ty:${Math.sin(angle)*dist}px;
            animation-delay:${Math.random()*0.05}s;
          `;
          document.body.appendChild(p);
          p.addEventListener('animationend', () => p.remove());
        }
      }

      loadCount();
    </script>
  </body>
</html>
